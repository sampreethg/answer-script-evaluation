<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GradeVision AI - Dynamic Database Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-dark: #070a12;
      --bg-panel: rgba(15, 22, 36, 0.88);
      --border-panel: rgba(255, 255, 255, 0.12);
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --accent: #06b6d4;
      --success: #10b981;
      --danger: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --radius-lg: 22px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--bg-dark); color: var(--text-main); font-family: var(--font-main); min-height: 100vh; position: relative; }
    .auth-container { max-width: 520px; margin: 50px auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .logo-icon-large { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #fff; margin: 0 auto 12px auto; }
    .auth-title { font-size: 2rem; font-weight: 800; }
    .gradient-text { background: linear-gradient(135deg, var(--accent), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .auth-card { width: 100%; background: var(--bg-panel); border: 1px solid var(--border-panel); border-radius: var(--radius-lg); padding: 32px; }
    .role-selector-tabs { display: flex; background: rgba(255, 255, 255, 0.04); padding: 5px; border-radius: 14px; margin-bottom: 20px; gap: 6px; }
    .role-tab-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 10px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .role-tab-btn.active { background: linear-gradient(135deg, var(--primary), #4f46e5); color: #fff; }
    .mode-toggle-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border-panel); padding-bottom: 10px; }
    .mode-btn { background: transparent; border: none; color: var(--text-muted); font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    .mode-btn.active { color: #fff; border-bottom: 3px solid var(--primary); }
    .fields-group, .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .input-group input { background: rgba(10, 15, 26, 0.85); border: 1px solid var(--border-panel); padding: 11px 14px; border-radius: 10px; color: #fff; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; width: 100%; padding: 12px; font-size: 0.95rem; margin-top: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
    .status-msg { margin-top: 10px; font-size: 0.82rem; text-align: center; font-weight: 600; display: none; }
    .status-msg.error { color: var(--danger); display: block; }
    .status-msg.success { color: var(--success); display: block; }
  </style>
</head>
<body class="dark-theme">
  <main class="auth-container">
    <div style="text-align:center; margin-bottom:24px;">
      <div class="logo-icon-large"><i data-lucide="database"></i></div>
      <h1 class="auth-title">GradeVision<span class="gradient-text">.AI</span></h1>
      <p style="font-size:0.85rem; color:var(--text-muted);">Dynamic Database Authentication</p>
    </div>

    <div class="auth-card">
      <div class="role-selector-tabs">
        <button type="button" class="role-tab-btn active" id="tabTeacherBtn" onclick="switchAuthRole('teacher')"><i data-lucide="graduation-cap"></i> Teacher Portal</button>
        <button type="button" class="role-tab-btn" id="tabStudentBtn" onclick="switchAuthRole('student')"><i data-lucide="user"></i> Student Portal</button>
      </div>

      <div class="mode-toggle-bar">
        <button type="button" class="mode-btn active" id="btnSigninMode" onclick="setAuthMode('signin')">Sign In</button>
        <button type="button" class="mode-btn" id="btnRegisterMode" onclick="setAuthMode('register')">New Registration</button>
      </div>

      <form id="authLoginForm" onsubmit="handleAuthSubmit(event)">
        <div id="teacherRegisterFields" class="fields-group" style="display: none;">
          <div class="input-group"><label>Teacher Name:</label><input type="text" id="tNameInput" placeholder="Full name"></div>
          <div class="input-group"><label>Department (Dept):</label><input type="text" id="tDeptInput" placeholder="e.g. CSE Dept"></div>
          <div class="input-group"><label>Subject Taught:</label><input type="text" id="tSubjectInput" placeholder="e.g. Data Structures"></div>
        </div>

        <div id="studentRegisterFields" class="fields-group" style="display: none;">
          <div class="input-group"><label>Student Name:</label><input type="text" id="sNameInput" placeholder="Full name"></div>
          <div class="input-group"><label>Register / Roll Number (Reg No):</label><input type="text" id="sRegNoInput" placeholder="e.g. 238 or 1ST23CS084"></div>
          <div class="input-group"><label>Department (Dept):</label><input type="text" id="sDeptInput" placeholder="e.g. CSE Dept"></div>
        </div>

        <div class="input-group"><label>Mail ID:</label><input type="email" id="emailInput" required placeholder="Enter email address"></div>
        <div class="input-group"><label>Password:</label><input type="password" id="passwordInput" required placeholder="Enter password"></div>

        <button type="submit" class="btn-primary" id="submitBtn"><i data-lucide="database"></i> <span id="submitBtnLabel">Sign In</span></button>
        <div id="statusMessage" class="status-msg"></div>
      </form>
    </div>
  </main>

  <script>
    let activeRole = 'teacher', activeMode = 'signin';
    document.addEventListener('DOMContentLoaded', () => { initDatabase(); switchAuthRole('teacher'); setAuthMode('signin'); lucide.createIcons(); });
    function initDatabase() { if (!localStorage.getItem('gradevision_sql_db')) localStorage.setItem('gradevision_sql_db', JSON.stringify([])); }
    function getDBUsers() { return JSON.parse(localStorage.getItem('gradevision_sql_db') || '[]'); }
    function saveDBUser(u) { const users = getDBUsers(); users.push(u); localStorage.setItem('gradevision_sql_db', JSON.stringify(users)); }
    function switchAuthRole(r) { activeRole = r; document.getElementById('tabTeacherBtn').classList.toggle('active', r === 'teacher'); document.getElementById('tabStudentBtn').classList.toggle('active', r === 'student'); updateFields(); }
    function setAuthMode(m) { activeMode = m; document.getElementById('btnSigninMode').classList.toggle('active', m === 'signin'); document.getElementById('btnRegisterMode').classList.toggle('active', m === 'register'); document.getElementById('submitBtnLabel').innerText = m === 'signin' ? 'Sign In' : 'Register Account'; updateFields(); }
    function updateFields() { const isReg = activeMode === 'register'; document.getElementById('teacherRegisterFields').style.display = (isReg && activeRole === 'teacher') ? 'flex' : 'none'; document.getElementById('studentRegisterFields').style.display = (isReg && activeRole === 'student') ? 'flex' : 'none'; }
    function showStatus(m, e=false) { const el = document.getElementById('statusMessage'); el.innerText = m; el.className = 'status-msg ' + (e ? 'error' : 'success'); }
    async function handleAuthSubmit(ev) {
      ev.preventDefault(); const email = document.getElementById('emailInput').value.trim(), password = document.getElementById('passwordInput').value.trim(), users = getDBUsers();
      if (activeMode === 'register') {
        if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) return showStatus('❌ Email exists in DB. Sign in.', true);
        let u = { role: activeRole, email, password };
        if (activeRole === 'teacher') { u.name = document.getElementById('tNameInput').value; u.dept = document.getElementById('tDeptInput').value; u.subject = document.getElementById('tSubjectInput').value; }
        else { u.name = document.getElementById('sNameInput').value; u.regNo = document.getElementById('sRegNoInput').value; u.dept = document.getElementById('sDeptInput').value; }
        saveDBUser(u); showStatus('✅ Account registered! Redirecting...'); setTimeout(() => redirect(u), 800);
      } else {
        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.role === activeRole);
        if (!user || user.password !== password) return showStatus('❌ Invalid email or password.', true);
        showStatus(`✅ Welcome ${user.name}`); setTimeout(() => redirect(user), 800);
      }
    }
    function redirect(u) {
      const name = encodeURIComponent(u.name), subject = encodeURIComponent(u.subject || 'Data Structures'), dept = encodeURIComponent(u.dept), regNo = encodeURIComponent(u.regNo || '238');
      window.location.href = u.role === 'student' ? `student_dashboard.html?name=${name}&regNo=${regNo}&dept=${dept}` : `dashboard.html?name=${name}&subject=${subject}&dept=${dept}`;
    }
  </script>
</body>
</html>
